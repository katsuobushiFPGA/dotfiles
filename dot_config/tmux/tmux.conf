# prefixをCtrl+Spaceに変更
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# マウスで ペイン選択／スクロール／リサイズなどをできるようにする
set -g mouse on

# 各ペインのスクロールバック（履歴）を増やす
set -g history-limit 200000

# window番号/ペイン番号を1始まりにする
set -g base-index 1
setw -g pane-base-index 1

# windowを閉じた時に番号を詰める
set -g renumber-windows on

# monitor-activity で “出力があった” を監視対象にし、visual-activity で ステータス/表示で通知する
set -g monitor-activity on
set -g visual-activity on

# ベル系の挙動を抑制/視覚通知に寄せる
set -g bell-action none
set -g visual-bell on

# デフォルト分割（" と %）を外して、| と - に割り当て
bind-key | split-window -h
bind-key - split-window -v

# ペイン枠の「ステータス行」を表示（top or bottom）
set -g pane-border-status top

# ペイン枠に表示する文字列（例：1.2 = window 1 / pane 2）
set -g pane-border-format "#{window_index}.#{pane_index} #{pane_current_command}"

# prefix + w + 数字 で window を選択（w=window）
bind-key w command-prompt -p "window(1-9):" "select-window -t :%%"

# prefix + p + 数字 で pane を選択（p=pane）
bind-key p command-prompt -p "pane(1-9):" "select-pane -t :.+%%"

# 設定リロード
bind-key r source-file ~/.config/tmux/tmux.conf \; display-message "tmux.conf reloaded"

# セッション開始時にチートシートを右端に表示
set-hook -g after-new-session \
  'split-window -h -l 30 -d "cat ~/.config/tmux/cheatsheet.txt; read"'
